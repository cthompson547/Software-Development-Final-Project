{% extends 'cafe/base.html' %}

{% block content %}
<div style="
    position: absolute;
    top: 300px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    background-color: #FAF6F0;
    border: 5px solid #8B4513;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
">
    <h2 style="
        color: #E8A38F;
        text-align: center;
        font-family: 'Arial', sans-serif;
        margin-bottom: 20px;
    ">Upcoming Events</h2>
    
        <ul style="
            list-style: none;
            padding: 0;
        ">
            {% for event in events %}
                <li style="
                    background-color: #F5EDE4;
                    border-left: 4px solid #C9A66B;
                    padding: 15px;
                    margin-bottom: 15px;
                    border-radius: 5px;
                ">
                    <h3 style="
                        color: #8B4513;
                        margin: 0 0 10px 0;
                        font-family: 'Arial', sans-serif;
                    ">{{ event.name }}</h3>
                    <p style="
                        color: #5A5A5A;
                        margin: 5px 0;
                        font-family: 'Arial', sans-serif;
                    "><strong>Date:</strong> {{ event.date }}</p>
                    <p style="
                        color: #5A5A5A;
                        margin: 5px 0;
                        font-family: 'Arial', sans-serif;
                    "><strong>Description:</strong> {{ event.description }}</p>
                </li>
            {% endfor %}
        </ul>
</div>
{% endblock %}
